services:

  fastapi:

    build:
      context: .
      dockerfile: Dockerfile.fastapi

    container_name: ai-career-fastapi

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    restart: unless-stopped

  streamlit:

    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: ai-career-streamlit

    ports:
      - "8501:8501"

    environment:
      API_BASE_URL: http://fastapi:8000/api/v1

    depends_on:
      - fastapi

    volumes:
    
      - ./data:/app/data

    restart: unless-stopped